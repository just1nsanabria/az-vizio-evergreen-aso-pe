apiVersion: containerservice.azure.com/v1api20231001
kind: ManagedCluster
metadata:
  name: aks-eus2-spoke-01
  namespace: default
spec:
  location: eastus2

  owner:
    armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-spoke-evergreen-01

  dnsPrefix: aks-eus2-spoke

  # ── Private cluster ─────────────────────────────────────────────────────────
  apiServerAccessProfile:
    enablePrivateCluster: true

  # ── Identity (system-assigned; ASO will manage it) ──────────────────────────
  identity:
    type: SystemAssigned

  # ── Node pool ───────────────────────────────────────────────────────────────
  agentPoolProfiles:
    - name: system
      count: 3
      vmSize: Standard_D4as_v7
      osType: Linux
      mode: System
      osDiskSizeGB: 128
      vnetSubnetReference:
        armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-spoke-evergreen-01/providers/Microsoft.Network/virtualNetworks/vnet-eus2-spoke-evergreen-01/subnets/snet-aks
      nodeTaints: []

  # ── Networking ───────────────────────────────────────────────────────────────
  networkProfile:
    networkPlugin:        azure
    networkPluginMode:    overlay
    networkDataplane:     azure
    ipFamilies:
      - IPv4
      - IPv6
    podCidrs:
      - 192.169.0.0/16
      - fd00:20::/112
    serviceCidrs:
      - 172.18.0.0/16
      - fd00:21::/108
    dnsServiceIP: 172.18.0.10
    outboundType: userDefinedRouting

  # ── Security / workload identity ──────────────────────────────────────────
  oidcIssuerProfile:
    enabled: true
  securityProfile:
    workloadIdentity:
      enabled: true

  # ── Optional add-ons ────────────────────────────────────────────────────────
  addonProfiles:
    azurePolicy:
      enabled: false
    omsAgent:
      enabled: false
