# PrivateDnsZonesVirtualNetworkLink — hub VNet → shadow zone (spoke RG)
#
# Links the hub-facing shadow zone (privatelink.eastus2.azmk8s.io in
# rg-eus2-spoke-evergreen-01, created by dns-zone.yaml) to the hub VNet.
#
# This gives the DNS Private Resolver and hub pods / VPN clients a path
# to resolve the spoke-02 API server FQDN to the PE NIC IP that is
# auto-registered in the shadow zone by dns-zonegroup.yaml.
#
# The BYO zone (same name, rg-eus2-hub-evergreen-01) is NOT linked to the
# hub VNet — it remains linked only to the spoke VNet (by AKS), so spoke
# pods continue to resolve to the native NIC IP:
#
#   Spoke VNet → BYO zone  (hub RG)   → spoke NIC IP  ✅
#   Hub VNet   → shadow zone (spoke RG) → PE NIC IP    ✅
#
apiVersion: network.azure.com/v1api20200601
kind: PrivateDnsZonesVirtualNetworkLink
metadata:
  name: link-hub-vnet-spoke-02
  namespace: default
spec:
  location: global

  # Owner is the SHADOW zone in spoke RG — created by dns-zone.yaml.
  # Do NOT point this at the BYO zone in hub RG or hub clients will
  # resolve to the spoke NIC IP instead of the PE NIC IP.
  owner:
    armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-spoke-evergreen-01/providers/Microsoft.Network/privateDnsZones/privatelink.eastus2.azmk8s.io

  registrationEnabled: false

  virtualNetwork:
    reference:
      armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-hub-evergreen-01/providers/Microsoft.Network/virtualNetworks/vnet-eus2-hub-evergreen-01
