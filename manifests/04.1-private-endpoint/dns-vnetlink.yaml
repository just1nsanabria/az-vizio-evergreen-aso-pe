# PrivateDnsZonesVirtualNetworkLink — hub VNet → shadow zone (hub RG)
#
# Links the hub-facing shadow zone (privatelink.eastus2.azmk8s.io in
# rg-eus2-hub-evergreen-01, created by dns-zone.yaml) to the hub VNet.
#
# This gives the DNS Private Resolver and hub pods / VPN clients a path
# to resolve the spoke-02 API server FQDN to the PE NIC IP that is
# auto-registered in the shadow zone by dns-zonegroup.yaml.
#
# The BYO zone (same name, rg-eus2-spoke-evergreen-02) is Terraform-managed
# and is NOT linked to the hub VNet — AKS auto-links it to the spoke VNet
# only, so spoke pods resolve to the native NIC IP:
#
#   Spoke VNet → BYO zone (rg-eus2-spoke-evergreen-02) → spoke NIC IP  ✅
#   Hub VNet   → shadow zone (rg-eus2-hub-evergreen-01) → PE NIC IP    ✅
#
apiVersion: network.azure.com/v1api20200601
kind: PrivateDnsZonesVirtualNetworkLink
metadata:
  name: link-hub-vnet-spoke-02
  namespace: default
spec:
  location: global

  # Owner is the SHADOW zone in hub RG — created by dns-zone.yaml.
  # Do NOT point this at the BYO zone in rg-eus2-spoke-evergreen-02 or hub
  # clients will resolve to the spoke NIC IP instead of the PE NIC IP.
  owner:
    armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-hub-evergreen-01/providers/Microsoft.Network/privateDnsZones/privatelink.eastus2.azmk8s.io

  registrationEnabled: false

  virtualNetwork:
    reference:
      armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-hub-evergreen-01/providers/Microsoft.Network/virtualNetworks/vnet-eus2-hub-evergreen-01
