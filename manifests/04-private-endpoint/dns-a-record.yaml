# ASO A record in the hub-owned shadow DNS zone.
#
# Points the spoke API server FQDN to the PE NIC private IP in hub snet-pe
# (10.0.3.x). Together with the hub-owned zone (dns-zone.yaml) and VNet link
# (dns-vnetlink.yaml), this gives hub workloads and VPN clients a clean DNS
# path to the spoke API server through the private endpoint.
#
# The AKS-managed A record in the MC_ zone (10.4.x.x → spoke native NIC) is
# left completely untouched, so spoke pods always resolve to their own NIC.
#
# All three placeholders are substituted at runtime by the manifests workflow:
#   <dns-zone-name>  – GUID-based zone name  (e.g. 956e6f88-...azmk8s.io)
#   <a-record-name>  – hostname prefix of the spoke private FQDN
#                      (e.g. aks-eus2-spoke-awahnre4)
#   <pe-nic-ip>      – private IP of the pe-aks-spoke-01 NIC in hub snet-pe
#
apiVersion: network.azure.com/v1api20200601
kind: PrivateDnsZonesARecord
metadata:
  name: spoke-api-server-pe-override
  namespace: default
spec:
  azureName: <a-record-name>

  # Owner is the hub-RG zone, not the MC_ zone.
  owner:
    armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-hub-evergreen-01/providers/Microsoft.Network/privateDnsZones/<dns-zone-name>

  ttl: 300

  aRecords:
    - ipv4Address: <pe-nic-ip>
