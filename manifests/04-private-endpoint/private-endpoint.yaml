# Private Endpoint for the spoke AKS management plane.
#
# This creates a Private Endpoint in the hub snet-pe subnet that maps to
# the spoke AKS cluster.  Once in place, DNS queries for the spoke API server
# FQDN resolve to the private IP, keeping traffic fully inside the hub VNet.
#
# Replace ALL <placeholder> values:
#
#   Subscription ID:
#     terraform -chdir=../../infra output subscription_id   (or from terraform.tfvars)
#
#   Hub RG name:
#     terraform -chdir=../../infra output hub_rg_name
#
#   Hub VNet name + hub_pe_subnet_id:
#     terraform -chdir=../../infra output hub_pe_subnet_id
#
#   Spoke cluster ARM ID:
#     az aks show -g <spoke-rg> -n <spoke-aks-name> --query id -o tsv
#     – or –
#     terraform -chdir=../../infra output spoke_aks_cluster_id  (if added to outputs)
#
apiVersion: network.azure.com/v1api20220701
kind: PrivateEndpoint
metadata:
  name: pe-aks-spoke-01
  namespace: default
spec:
  location: eastus2

  # Private endpoint lives in the hub resource group
  owner:
    armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-hub-evergreen-01

  subnet:
    reference:
      armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-hub-evergreen-01/providers/Microsoft.Network/virtualNetworks/vnet-eus2-hub-evergreen-01/subnets/snet-pe

  privateLinkServiceConnections:
    - name: aksPrivateLink
      privateLinkServiceReference:
        armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-spoke-evergreen-01/providers/Microsoft.ContainerService/managedClusters/aks-eus2-spoke-01
      groupIds:
        - management
