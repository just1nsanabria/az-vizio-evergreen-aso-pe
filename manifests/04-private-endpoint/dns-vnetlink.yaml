# ASO PrivateDnsZonesVirtualNetworkLink
#
# Links the spoke cluster's auto-created private DNS zone (in its MC_ RG)
# to the hub VNet so that hub workloads and VPN clients can resolve the
# spoke AKS API server FQDN via the private endpoint in snet-pe.
#
# The DNS zone name contains a cluster-unique GUID and is rendered at
# deployment time by the manifests workflow (step 04). The placeholder
# <dns-zone-name> is replaced with the actual zone name via sed before
# kubectl apply.
#
apiVersion: network.azure.com/v1api20200601
kind: PrivateDnsZonesVirtualNetworkLink
metadata:
  name: link-hub-vnet-spoke
  namespace: default
spec:
  location: global

  # Owner is the private DNS zone in the spoke cluster's MC_ resource group.
  # The zone name (containing the cluster GUID) is substituted at runtime.
  owner:
    armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/MC_rg-eus2-spoke-evergreen-01_aks-eus2-spoke-01_eastus2/providers/Microsoft.Network/privateDnsZones/<dns-zone-name>

  registrationEnabled: false

  virtualNetwork:
    reference:
      armId: /subscriptions/f9ea6521-6599-4549-a5f1-5986548330f8/resourceGroups/rg-eus2-hub-evergreen-01/providers/Microsoft.Network/virtualNetworks/vnet-eus2-hub-evergreen-01
