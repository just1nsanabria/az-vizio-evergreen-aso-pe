name: "Phase 2 – Kubernetes Manifests (ASO)"

# Phase 2 requires a self-hosted runner inside hub AKS so it can reach the
# private API server. Install Actions Runner Controller (ARC) after Phase 1
# completes — see the Deployment Guide in README.md.
#
# All steps are gated behind the `production` environment (same approval gate
# as Terraform) and must be triggered manually in the correct order.

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to deploy"
        required: true
        type: choice
        options:
          - 01-cert-manager
          - 02-aso
          - 03-spoke-cluster
          - 04-private-endpoint

concurrency:
  group: manifests-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: "Deploy ${{ github.event.inputs.step }}"
    runs-on: arc-runner-set     # self-hosted ARC runner inside hub AKS
    environment: production     # requires manual approval before proceeding

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ARC runner images are minimal — install tooling before use
      - name: Install Azure CLI + kubectl + Helm
        run: |
          # Azure CLI
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

          # kubectl
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

          # Helm
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          az version
          kubectl version --client
          helm version

      # Azure login for fetching identity values and AKS credentials
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:        ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:        ${{ secrets.AZURE_TENANT_ID }}
          subscription-id:  ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get hub AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-eus2-hub-evergreen-01 \
            --name aks-eus2-hub-evergreen-01 \
            --overwrite-existing

      # ── 01  cert-manager ───────────────────────────────────────────────────
      - name: "01 – Install cert-manager"
        if: github.event.inputs.step == '01-cert-manager'
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.14.4 \
            --values manifests/01-cert-manager/values.yaml \
            --wait \
            --timeout 5m

          echo "cert-manager pods:"
          kubectl -n cert-manager get pods

      # ── 02  ASO ───────────────────────────────────────────────────────────
      - name: "02 – Render ASO values"
        if: github.event.inputs.step == '02-aso'
        run: |
          # Pull the ASO identity client ID that Terraform provisioned
          ASO_CLIENT_ID=$(az identity show \
            --resource-group rg-eus2-hub-evergreen-01 \
            --name mi-aso-hub \
            --query clientId -o tsv)

          sed \
            -e "s|<subscription-id>|${{ secrets.AZURE_SUBSCRIPTION_ID }}|g" \
            -e "s|<tenant-id>|${{ secrets.AZURE_TENANT_ID }}|g" \
            -e "s|<aso-managed-identity-client-id>|${ASO_CLIENT_ID}|g" \
            manifests/02-aso/values.yaml > /tmp/aso-values-rendered.yaml

          # Mask the client ID in logs
          echo "::add-mask::${ASO_CLIENT_ID}"
          echo "ASO values rendered successfully"

      - name: "02 – Install ASO"
        if: github.event.inputs.step == '02-aso'
        run: |
          helm repo add aso2 \
            https://raw.githubusercontent.com/Azure/azure-service-operator/main/v2/charts
          helm repo update

          helm upgrade --install azureserviceoperator aso2/azure-service-operator \
            --namespace azureserviceoperator-system \
            --create-namespace \
            --version 2.9.0 \
            --values /tmp/aso-values-rendered.yaml \
            --wait \
            --timeout 10m

          echo "ASO pods:"
          kubectl -n azureserviceoperator-system get pods

          echo "Spot-check CRDs:"
          kubectl get crds | grep -c "azure.com" | xargs -I{} echo "{} ASO CRDs installed"

      # ── 03  Spoke cluster ─────────────────────────────────────────────────
      - name: "03 – Deploy spoke AKS via ASO"
        if: github.event.inputs.step == '03-spoke-cluster'
        run: |
          # Verify ASO is healthy before submitting the cluster manifest
          kubectl -n azureserviceoperator-system wait \
            --for=condition=Ready pod \
            --selector=app.kubernetes.io/name=azure-service-operator \
            --timeout=120s

          kubectl apply -f manifests/03-spoke-cluster/managed-cluster.yaml

          echo "ManagedCluster submitted. Polling for Ready (up to 20 min)..."
          kubectl wait managedclusters.containerservice.azure.com/aks-eus2-spoke-01 \
            --for=condition=Ready \
            --namespace default \
            --timeout=20m

          echo "Spoke cluster status:"
          kubectl get managedclusters.containerservice.azure.com/aks-eus2-spoke-01 \
            -n default -o wide || true

      # ── 04  Private endpoint + DNS VNet link ────────────────────────────────
      - name: "04 – Deploy private endpoint"
        if: github.event.inputs.step == '04-private-endpoint'
        run: |
          kubectl apply -f manifests/04-private-endpoint/private-endpoint.yaml

          echo "Waiting for PrivateEndpoint to become Ready (up to 10 min)..."
          kubectl wait privateendpoints.network.azure.com/pe-aks-spoke-01 \
            --for=condition=Ready \
            --namespace default \
            --timeout=10m

          echo "Private endpoint ready. Gathering runtime values..."
          SPOKE_MC_RG="MC_rg-eus2-spoke-evergreen-01_aks-eus2-spoke-01_eastus2"

          # GUID-based private DNS zone name — only known after cluster is provisioned
          DNS_ZONE=$(az network private-dns zone list \
            --resource-group "${SPOKE_MC_RG}" \
            --query "[0].name" -o tsv)
          echo "DNS zone:        ${DNS_ZONE}"

          # Hostname prefix of the spoke private FQDN — must match the AKS-created
          # A record exactly so the override replaces it rather than adding a second one
          SPOKE_FQDN=$(az aks show \
            -g rg-eus2-spoke-evergreen-01 \
            -n aks-eus2-spoke-01 \
            --query privateFqdn -o tsv)
          A_RECORD_NAME=$(echo "${SPOKE_FQDN}" | cut -d. -f1)
          echo "A record name:   ${A_RECORD_NAME}"

          # Private IP of the PE NIC in hub snet-pe — assigned dynamically at PE creation
          PE_NIC_ID=$(az network private-endpoint show \
            -g rg-eus2-hub-evergreen-01 \
            -n pe-aks-spoke-01 \
            --query "networkInterfaces[0].id" -o tsv)
          PE_NIC_IP=$(az network nic show --ids "${PE_NIC_ID}" \
            --query "ipConfigurations[0].privateIPAddress" -o tsv)
          echo "PE NIC IP:       ${PE_NIC_IP}"

          # ── DNS zone group ──────────────────────────────────────────────────
          sed "s|<dns-zone-name>|${DNS_ZONE}|g" \
            manifests/04-private-endpoint/dns-zonegroup.yaml \
            > /tmp/dns-zonegroup-rendered.yaml

          kubectl apply -f /tmp/dns-zonegroup-rendered.yaml

          echo "Waiting for PrivateDnsZoneGroup to become Ready (up to 5 min)..."
          kubectl wait privateendpointsprivatednszonegroups.network.azure.com/pe-aks-spoke-01-dnsgroup \
            --for=condition=Ready \
            --namespace default \
            --timeout=5m

          # ── A record override ───────────────────────────────────────────────
          # Overrides the AKS-created A record (which points to the spoke-internal
          # NIC at 10.4.x.x) so the spoke FQDN resolves to the PE NIC in hub
          # snet-pe (10.0.3.x) instead. This makes the spoke API server reachable
          # from VPN clients and hub workloads without traversing AVNM peering.
          sed \
            -e "s|<dns-zone-name>|${DNS_ZONE}|g" \
            -e "s|<a-record-name>|${A_RECORD_NAME}|g" \
            -e "s|<pe-nic-ip>|${PE_NIC_IP}|g" \
            manifests/04-private-endpoint/dns-a-record.yaml \
            > /tmp/dns-a-record-rendered.yaml

          kubectl apply -f /tmp/dns-a-record-rendered.yaml

          echo "Waiting for PrivateDnsZonesARecord to become Ready (up to 3 min)..."
          kubectl wait privatednszonesarecords.network.azure.com/spoke-api-server-pe-override \
            --for=condition=Ready \
            --namespace default \
            --timeout=3m

          # ── VNet link ───────────────────────────────────────────────────────
          # Links the zone to the hub VNet so hub workloads and VPN clients can
          # resolve it via the DNS Private Resolver.
          sed "s|<dns-zone-name>|${DNS_ZONE}|g" \
            manifests/04-private-endpoint/dns-vnetlink.yaml \
            > /tmp/dns-vnetlink-rendered.yaml

          kubectl apply -f /tmp/dns-vnetlink-rendered.yaml

          echo "Waiting for PrivateDnsZonesVirtualNetworkLink to become Ready (up to 5 min)..."
          kubectl wait privatednszonesvirtualnetworklinks.network.azure.com/link-hub-vnet-spoke \
            --for=condition=Ready \
            --namespace default \
            --timeout=5m

          echo ""
          echo "Private endpoint:"
          kubectl get privateendpoints.network.azure.com/pe-aks-spoke-01 -n default -o wide || true
          echo ""
          echo "DNS zone group:"
          kubectl get privateendpointsprivatednszonegroups.network.azure.com/pe-aks-spoke-01-dnsgroup -n default -o wide || true
          echo ""
          echo "DNS A record override:"
          kubectl get privatednszonesakrecords.network.azure.com/spoke-api-server-pe-override -n default -o wide || true
          echo ""
          echo "DNS VNet link:"
          kubectl get privatednszonesvirtualnetworklinks.network.azure.com/link-hub-vnet-spoke -n default -o wide || true
          echo ""
          echo "Verify resolution (should return ${PE_NIC_IP}):"
          echo "  nslookup ${SPOKE_FQDN} 10.0.3.196"
