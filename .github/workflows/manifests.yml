name: "Phase 2 – Kubernetes Manifests (ASO)"

# Phase 2 requires a self-hosted runner inside hub AKS so it can reach the
# private API server. Install Actions Runner Controller (ARC) after Phase 1
# completes — see the Deployment Guide in README.md.
#
# All steps are gated behind the `production` environment (same approval gate
# as Terraform) and must be triggered manually in the correct order.

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to deploy"
        required: true
        type: choice
        options:
          - 01-cert-manager
          - 02-aso
          - 03-spoke-cluster
          - 03.1-spoke-cluster
          - 04-private-endpoint
          - 04.1-private-endpoint

concurrency:
  group: manifests-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: "Deploy ${{ github.event.inputs.step }}"
    runs-on: arc-runner-set     # self-hosted ARC runner inside hub AKS
    environment: production     # requires manual approval before proceeding

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ARC runner images are minimal — install tooling before use
      - name: Install Azure CLI + kubectl + Helm
        run: |
          # Azure CLI
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

          # kubectl
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

          # Helm
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          az version
          kubectl version --client
          helm version

      # Azure login for fetching identity values and AKS credentials
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:        ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:        ${{ secrets.AZURE_TENANT_ID }}
          subscription-id:  ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get hub AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-eus2-hub-evergreen-01 \
            --name aks-eus2-hub-evergreen-01 \
            --overwrite-existing

      # ── 01  cert-manager ───────────────────────────────────────────────────
      - name: "01 – Install cert-manager"
        if: github.event.inputs.step == '01-cert-manager'
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update

          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.14.4 \
            --values manifests/01-cert-manager/values.yaml \
            --wait \
            --timeout 5m

          echo "cert-manager pods:"
          kubectl -n cert-manager get pods

      # ── 02  ASO ───────────────────────────────────────────────────────────
      - name: "02 – Render ASO values"
        if: github.event.inputs.step == '02-aso'
        run: |
          # Pull the ASO identity client ID that Terraform provisioned
          ASO_CLIENT_ID=$(az identity show \
            --resource-group rg-eus2-hub-evergreen-01 \
            --name mi-aso-hub \
            --query clientId -o tsv)

          sed \
            -e "s|<subscription-id>|${{ secrets.AZURE_SUBSCRIPTION_ID }}|g" \
            -e "s|<tenant-id>|${{ secrets.AZURE_TENANT_ID }}|g" \
            -e "s|<aso-managed-identity-client-id>|${ASO_CLIENT_ID}|g" \
            manifests/02-aso/values.yaml > /tmp/aso-values-rendered.yaml

          # Mask the client ID in logs
          echo "::add-mask::${ASO_CLIENT_ID}"
          echo "ASO values rendered successfully"

      - name: "02 – Install ASO"
        if: github.event.inputs.step == '02-aso'
        run: |
          helm repo add aso2 \
            https://raw.githubusercontent.com/Azure/azure-service-operator/main/v2/charts
          helm repo update

          helm upgrade --install azureserviceoperator aso2/azure-service-operator \
            --namespace azureserviceoperator-system \
            --create-namespace \
            --version 2.9.0 \
            --values /tmp/aso-values-rendered.yaml \
            --wait \
            --timeout 10m

          echo "ASO pods:"
          kubectl -n azureserviceoperator-system get pods

          echo "Spot-check CRDs:"
          kubectl get crds | grep -c "azure.com" | xargs -I{} echo "{} ASO CRDs installed"

      # ── 03  Spoke cluster ─────────────────────────────────────────────────
      - name: "03 – Deploy spoke AKS via ASO"
        if: github.event.inputs.step == '03-spoke-cluster'
        run: |
          # Verify ASO is healthy before submitting the cluster manifest
          kubectl -n azureserviceoperator-system wait \
            --for=condition=Ready pod \
            --selector=app.kubernetes.io/name=azure-service-operator \
            --timeout=120s

          kubectl apply -f manifests/03-spoke-cluster/managed-cluster.yaml

          echo "ManagedCluster submitted. Polling for Ready (up to 20 min)..."
          kubectl wait managedclusters.containerservice.azure.com/aks-eus2-spoke-01 \
            --for=condition=Ready \
            --namespace default \
            --timeout=20m

          echo "Spoke cluster status:"
          kubectl get managedclusters.containerservice.azure.com/aks-eus2-spoke-01 \
            -n default -o wide || true

      # ── 03.1  Spoke cluster (BYO DNS) ───────────────────────────────────
      - name: "03.1 – Deploy spoke-02 AKS via ASO (BYO DNS)"
        if: github.event.inputs.step == '03.1-spoke-cluster'
        run: |
          # Verify ASO is healthy before submitting the cluster manifest
          kubectl -n azureserviceoperator-system wait \
            --for=condition=Ready pod \
            --selector=app.kubernetes.io/name=azure-service-operator \
            --timeout=120s

          kubectl apply -f manifests/03.1-spoke-cluster/custom-managed-cluster.yaml

          # AKS cluster provisioning routinely takes 15-25+ minutes.
          # Poll with a 45-minute timeout; print ASO status every 5 minutes
          # so the log shows progress rather than silence until failure.
          echo "ManagedCluster submitted. Polling for Ready (up to 45 min)..."
          DEADLINE=$(( $(date +%s) + 2700 ))   # 45 minutes
          INTERVAL=300                          # print status every 5 minutes
          LAST_PRINT=0
          while true; do
            NOW=$(date +%s)

            # Print a heartbeat every 5 minutes
            if (( NOW - LAST_PRINT >= INTERVAL )); then
              echo "--- $(date -u '+%H:%M:%S UTC') ASO status ---"
              kubectl get managedclusters.containerservice.azure.com/aks-eus2-spoke-02 \
                -n default -o jsonpath='{range .status.conditions[*]}{.type}{"\t"}{.status}{"\t"}{.message}{"\n"}{end}' 2>/dev/null || true
              LAST_PRINT=$NOW
            fi

            # Check if Ready condition is True
            READY=$(kubectl get managedclusters.containerservice.azure.com/aks-eus2-spoke-02 \
              -n default \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            if [[ "$READY" == "True" ]]; then
              echo "ManagedCluster is Ready."
              break
            fi

            # Check if ASO has posted a terminal error so we fail fast
            SEVERITY=$(kubectl get managedclusters.containerservice.azure.com/aks-eus2-spoke-02 \
              -n default \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].severity}' 2>/dev/null || true)
            if [[ "$SEVERITY" == "Error" ]]; then
              echo "ASO reported an error — printing full status before failing:"
              kubectl get managedclusters.containerservice.azure.com/aks-eus2-spoke-02 \
                -n default -o yaml | grep -A 40 'status:' || true
              exit 1
            fi

            if (( NOW >= DEADLINE )); then
              echo "Timed out after 45 minutes. Final ASO status:"
              kubectl get managedclusters.containerservice.azure.com/aks-eus2-spoke-02 \
                -n default -o yaml | grep -A 40 'status:' || true
              exit 1
            fi

            sleep 30
          done

          echo "Spoke cluster status:"
          kubectl get managedclusters.containerservice.azure.com/aks-eus2-spoke-02 \
            -n default -o wide || true

      # ── 04  Private endpoint + DNS ─────────────────────────────────────────
      - name: "04 – Deploy private endpoint"
        if: github.event.inputs.step == '04-private-endpoint'
        run: |
          kubectl apply -f manifests/04-private-endpoint/private-endpoint.yaml

          echo "Waiting for PrivateEndpoint to become Ready (up to 10 min)..."
          kubectl wait privateendpoints.network.azure.com/pe-aks-spoke-01 \
            --for=condition=Ready \
            --namespace default \
            --timeout=10m

          echo "Private endpoint ready. Gathering runtime values..."
          SPOKE_MC_RG="MC_rg-eus2-spoke-evergreen-01_aks-eus2-spoke-01_eastus2"

          # GUID-based private DNS zone name — only known after cluster is provisioned
          DNS_ZONE=$(az network private-dns zone list \
            --resource-group "${SPOKE_MC_RG}" \
            --query "[0].name" -o tsv)
          echo "DNS zone:        ${DNS_ZONE}"

          # Hostname prefix of the spoke private FQDN
          SPOKE_FQDN=$(az aks show \
            -g rg-eus2-spoke-evergreen-01 \
            -n aks-eus2-spoke-01 \
            --query privateFqdn -o tsv)
          A_RECORD_NAME=$(echo "${SPOKE_FQDN}" | cut -d. -f1)
          echo "A record name:   ${A_RECORD_NAME}"

          # Private IP of the PE NIC in hub snet-pe — assigned dynamically at PE creation
          PE_NIC_ID=$(az network private-endpoint show \
            -g rg-eus2-hub-evergreen-01 \
            -n pe-aks-spoke-01 \
            --query "networkInterfaces[0].id" -o tsv)
          PE_NIC_IP=$(az network nic show --ids "${PE_NIC_ID}" \
            --query "ipConfigurations[0].privateIPAddress" -o tsv)
          echo "PE NIC IP:       ${PE_NIC_IP}"

          # ── DNS zone group ──────────────────────────────────────────────────
          # Binds the PE to the MC_ zone so Azure tracks the NIC IP. This is
          # required even though hub resolution uses the hub-owned shadow zone.
          sed "s|<dns-zone-name>|${DNS_ZONE}|g" \
            manifests/04-private-endpoint/dns-zonegroup.yaml \
            > /tmp/dns-zonegroup-rendered.yaml

          kubectl apply -f /tmp/dns-zonegroup-rendered.yaml

          echo "Waiting for PrivateDnsZoneGroup to become Ready (up to 5 min)..."
          kubectl wait privateendpointsprivatednszonegroups.network.azure.com/pe-aks-spoke-01-dnsgroup \
            --for=condition=Ready \
            --namespace default \
            --timeout=5m

          # ── Hub-owned shadow DNS zone ───────────────────────────────────────
          # Creates a zone with the same GUID-based name in the hub RG.
          # The hub VNet is linked to this zone only — spoke VNet stays linked
          # to the MC_ zone only. Each VNet sees a different A record:
          #   Hub VNet  → hub zone  →  PE NIC IP (10.0.3.x)
          #   Spoke VNet → MC_ zone →  spoke NIC IP (10.4.x.x)
          sed "s|<dns-zone-name>|${DNS_ZONE}|g" \
            manifests/04-private-endpoint/dns-zone.yaml \
            > /tmp/dns-zone-rendered.yaml

          kubectl apply -f /tmp/dns-zone-rendered.yaml

          echo "Waiting for PrivateDnsZone to become Ready (up to 5 min)..."
          kubectl wait privatednszones.network.azure.com/spoke-api-server-zone \
            --for=condition=Ready \
            --namespace default \
            --timeout=5m

          # ── A record in hub zone ────────────────────────────────────────────
          # Points the spoke FQDN hostname to the PE NIC IP in hub snet-pe.
          # The AKS-managed record in the MC_ zone is left untouched.
          sed \
            -e "s|<dns-zone-name>|${DNS_ZONE}|g" \
            -e "s|<a-record-name>|${A_RECORD_NAME}|g" \
            -e "s|<pe-nic-ip>|${PE_NIC_IP}|g" \
            manifests/04-private-endpoint/dns-a-record.yaml \
            > /tmp/dns-a-record-rendered.yaml

          kubectl apply -f /tmp/dns-a-record-rendered.yaml

          echo "Waiting for PrivateDnsZonesARecord to become Ready (up to 3 min)..."
          kubectl wait privatednszonesarecords.network.azure.com/spoke-api-server-pe-override \
            --for=condition=Ready \
            --namespace default \
            --timeout=3m

          # ── VNet link — hub zone → hub VNet ────────────────────────────────
          # Links the hub-owned zone to the hub VNet. VPN clients and hub pods
          # query the DNS Private Resolver which sees this link and returns
          # the PE NIC IP. The MC_ zone is NOT linked to the hub VNet.
          sed "s|<dns-zone-name>|${DNS_ZONE}|g" \
            manifests/04-private-endpoint/dns-vnetlink.yaml \
            > /tmp/dns-vnetlink-rendered.yaml

          kubectl apply -f /tmp/dns-vnetlink-rendered.yaml

          echo "Waiting for PrivateDnsZonesVirtualNetworkLink to become Ready (up to 5 min)..."
          kubectl wait privatednszonesvirtualnetworklinks.network.azure.com/link-hub-vnet-spoke \
            --for=condition=Ready \
            --namespace default \
            --timeout=5m

          echo ""
          echo "=== Deployed resources ==="
          kubectl get privateendpoints.network.azure.com/pe-aks-spoke-01 -n default -o wide || true
          kubectl get privateendpointsprivatednszonegroups.network.azure.com/pe-aks-spoke-01-dnsgroup -n default -o wide || true
          kubectl get privatednszones.network.azure.com/spoke-api-server-zone -n default -o wide || true
          kubectl get privatednszonesarecords.network.azure.com/spoke-api-server-pe-override -n default -o wide || true
          kubectl get privatednszonesvirtualnetworklinks.network.azure.com/link-hub-vnet-spoke -n default -o wide || true
          echo ""
          echo "=== Verify resolution ==="
          echo "  Hub VNet / VPN (should return ${PE_NIC_IP}):"
          echo "    nslookup ${SPOKE_FQDN} 10.0.3.196"
          echo "  Spoke VNet (should return 10.4.x.x — unchanged):"
          echo "    nslookup ${SPOKE_FQDN} 168.63.129.16  # from spoke pod"

      # ── 04.1  Private endpoint + DNS (BYO DNS — static values) ────────────
      - name: "04.1 – Deploy private endpoint for spoke-02 (BYO DNS)"
        if: github.event.inputs.step == '04.1-private-endpoint'
        run: |
          # Split-horizon DNS using a shadow zone in the spoke RG:
          #   BYO zone  (rg-eus2-hub-evergreen-01, linked to spoke VNet by AKS)
          #     → aks-eus2-spoke-02  →  spoke NIC IP  (untouched, not linked to hub VNet)
          #   Shadow zone (rg-eus2-spoke-evergreen-01, linked to hub VNet below)
          #     → aks-eus2-spoke-02  →  PE NIC IP     (auto-registered by zone group)
          #
          # Zone names are statically known (privatelink.eastus2.azmk8s.io) —
          # no GUID lookups required.

          # ── Private endpoint ───────────────────────────────────────────────
          kubectl apply -f manifests/04.1-private-endpoint/private-endpoint.yaml

          echo "Waiting for PrivateEndpoint to become Ready (up to 10 min)..."
          kubectl wait privateendpoints.network.azure.com/pe-aks-spoke-02 \
            --for=condition=Ready \
            --namespace default \
            --timeout=10m

          # ── Hub-facing shadow zone ─────────────────────────────────────────
          # Creates privatelink.eastus2.azmk8s.io in rg-eus2-spoke-evergreen-01.
          # Separate RG from the BYO zone (hub RG) to enable split-horizon DNS.
          kubectl apply -f manifests/04.1-private-endpoint/dns-zone.yaml

          echo "Waiting for shadow PrivateDnsZone to become Ready (up to 5 min)..."
          kubectl wait privatednszones.network.azure.com/spoke-02-hub-shadow-zone \
            --for=condition=Ready \
            --namespace default \
            --timeout=5m

          # ── VNet link — shadow zone → hub VNet ────────────────────────────
          # Links the shadow zone (spoke RG) to the hub VNet so the DNS Private
          # Resolver and hub pods / VPN clients resolve to the PE NIC IP.
          # The BYO zone (hub RG) is NOT linked to the hub VNet.
          kubectl apply -f manifests/04.1-private-endpoint/dns-vnetlink.yaml

          echo "Waiting for PrivateDnsZonesVirtualNetworkLink to become Ready (up to 5 min)..."
          kubectl wait privatednszonesvirtualnetworklinks.network.azure.com/link-hub-vnet-spoke-02 \
            --for=condition=Ready \
            --namespace default \
            --timeout=5m

          # ── DNS zone group ─────────────────────────────────────────────────
          # Binds pe-aks-spoke-02 to the shadow zone. Azure auto-registers the
          # PE NIC IP as: aks-eus2-spoke-02.privatelink.eastus2.azmk8s.io
          # The BYO zone AKS-managed record is not touched.
          kubectl apply -f manifests/04.1-private-endpoint/dns-zonegroup.yaml

          echo "Waiting for PrivateDnsZoneGroup to become Ready (up to 5 min)..."
          kubectl wait privateendpointsprivatednszonegroups.network.azure.com/pe-aks-spoke-02-dnsgroup \
            --for=condition=Ready \
            --namespace default \
            --timeout=5m

          # Retrieve the PE NIC IP for the verification hint below
          PE_NIC_ID=$(az network private-endpoint show \
            -g rg-eus2-hub-evergreen-01 \
            -n pe-aks-spoke-02 \
            --query "networkInterfaces[0].id" -o tsv)
          PE_NIC_IP=$(az network nic show --ids "${PE_NIC_ID}" \
            --query "ipConfigurations[0].privateIPAddress" -o tsv)

          echo ""
          echo "=== Deployed resources ==="
          kubectl get privateendpoints.network.azure.com/pe-aks-spoke-02 -n default -o wide || true
          kubectl get privatednszones.network.azure.com/spoke-02-hub-shadow-zone -n default -o wide || true
          kubectl get privatednszonesvirtualnetworklinks.network.azure.com/link-hub-vnet-spoke-02 -n default -o wide || true
          kubectl get privateendpointsprivatednszonegroups.network.azure.com/pe-aks-spoke-02-dnsgroup -n default -o wide || true
          echo ""
          echo "=== Verify resolution ==="
          echo "  Hub VNet / VPN (should return ${PE_NIC_IP}):"
          echo "    nslookup aks-eus2-spoke-02.privatelink.eastus2.azmk8s.io 10.0.3.196"
          echo "  Spoke VNet (should return spoke NIC IP — BYO zone unchanged):"
          echo "    nslookup aks-eus2-spoke-02.privatelink.eastus2.azmk8s.io 168.63.129.16  # from spoke pod"
